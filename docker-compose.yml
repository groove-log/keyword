version: '3.8'

services:
  # 1. Redis 브로커
  redis:
    image: redis:7-alpine
    container_name: keyword-redis
    restart: always
    ports:
      - "6379:6379"
    

  # 2. PostgreSQL 데이터베이스 (외부 DB가 없을 경우 사용)
  db:
    image: postgres:15-alpine
    container_name: keyword-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-ledger_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledger_pass}
      POSTGRES_DB: ${DB_NAME:-ledger_db}
      TZ: Asia/Seoul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 3. Celery 워커 애플리케이션
  celery-worker:
    build: .
    container_name: keyword-worker
    restart: always
    environment:
      - TZ=Asia/Seoul
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ledger_db}
      - DB_USER=${DB_USER:-ledger_user}
      - DB_PASSWORD=${DB_PASSWORD:-ledger_pass}
      - LLAMA_API_URL=${DOCKER_LLAMA_API_URL:-http://host.docker.internal:8081}
      - LLAMA_API_KEY=${LLAMA_API_KEY:-embed-secure-key-1122}
      - LLAMA_EMBED_MODE=${LLAMA_EMBED_MODE:-v1}
      - DANGER_GUIDELINES=${DANGER_GUIDELINES:-}
      - EXTERNAL_GUIDELINES=${EXTERNAL_GUIDELINES:-}
      - DANGER_THRESHOLDS=${DANGER_THRESHOLDS:-}
      - DANGER_THRESHOLD=${DANGER_THRESHOLD:-0.20}
      - DANGER_KEYWORD_LINKED_THRESHOLD=${DANGER_KEYWORD_LINKED_THRESHOLD:-0.10}
      - DANGER_KEYWORD_MIN_SAFEGUARD_SCORE=${DANGER_KEYWORD_MIN_SAFEGUARD_SCORE:-0.15}
      - DANGER_KEYWORD_GUIDE_WEIGHT=${DANGER_KEYWORD_GUIDE_WEIGHT:-0.35}
    depends_on:
      - redis
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 4. FastAPI 웹 서비스
  web-app:
    build: .
    container_name: keyword-web-app
    restart: always
    command: ["uvicorn", "web_app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      - TZ=Asia/Seoul
      - REDIS_URL=redis://redis:6379/0
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-ledger_db}
      - DB_USER=${DB_USER:-ledger_user}
      - DB_PASSWORD=${DB_PASSWORD:-ledger_pass}
      - LLAMA_API_URL=${DOCKER_LLAMA_API_URL:-http://host.docker.internal:8081}
      - LLAMA_API_KEY=${LLAMA_API_KEY:-embed-secure-key-1122}
      - LLAMA_EMBED_MODE=${LLAMA_EMBED_MODE:-v1}
      - DANGER_GUIDELINES=${DANGER_GUIDELINES:-}
      - EXTERNAL_GUIDELINES=${EXTERNAL_GUIDELINES:-}
      - DANGER_THRESHOLDS=${DANGER_THRESHOLDS:-}
      - DANGER_THRESHOLD=${DANGER_THRESHOLD:-0.20}
      - DANGER_KEYWORD_LINKED_THRESHOLD=${DANGER_KEYWORD_LINKED_THRESHOLD:-0.10}
      - DANGER_KEYWORD_MIN_SAFEGUARD_SCORE=${DANGER_KEYWORD_MIN_SAFEGUARD_SCORE:-0.15}
      - DANGER_KEYWORD_GUIDE_WEIGHT=${DANGER_KEYWORD_GUIDE_WEIGHT:-0.35}
    depends_on:
      - redis
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - publish_default

networks:
  default:
  publish_default:
    external: true

volumes:
  postgres_data:

